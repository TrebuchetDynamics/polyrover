<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img" aria-labelledby="title desc">
  <title id="title">Polyrover capability layers</title>
  <desc id="desc">A map of Polyrover's synchronous core, default public async APIs, optional authentication and wallet helpers, and DTO-only execution and bridge surfaces.</desc>

  <rect width="1200" height="440" rx="24" fill="#07111F"/>
  <text x="56" y="54" fill="#F8FAFC" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="750">Compile the surface you need.</text>
  <text x="56" y="82" fill="#94A3B8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">FEATURES LIMIT COMPILATION — NOT AUTHORITY</text>

  <g id="feature-rails" transform="translate(56 112)">
    <g>
      <rect width="744" height="52" rx="10" fill="#102442" stroke="#5B8CFF" stroke-width="1.5"/>
      <text x="18" y="22" fill="#8EADFF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700">PUBLIC · DEFAULT</text>
      <text x="18" y="41" fill="#F8FAFC" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17">Gamma · CLOB · Data API · Market WSS · Resolution</text>
    </g>
    <g transform="translate(0 62)">
      <rect width="744" height="52" rx="10" fill="#101D31" stroke="#304461"/>
      <text x="18" y="22" fill="#94A3B8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700">AUTHENTICATED</text>
      <text x="18" y="41" fill="#E2E8F0" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17">Public + L2 HMAC helpers + User WSS</text>
    </g>
    <g transform="translate(0 124)">
      <rect width="744" height="52" rx="10" fill="#101D31" stroke="#304461"/>
      <text x="18" y="22" fill="#94A3B8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700">WALLET</text>
      <text x="18" y="41" fill="#E2E8F0" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17">Pure address derivation + readiness helpers</text>
    </g>
    <g transform="translate(0 186)">
      <rect width="744" height="52" rx="10" fill="#171B28" stroke="#5B6475" stroke-dasharray="6 5"/>
      <text x="18" y="22" fill="#AAB2C0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700">EXECUTION + BRIDGE</text>
      <text x="18" y="41" fill="#D6DAE1" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17">Typed DTOs and guards only — no network execution</text>
    </g>
    <g transform="translate(0 248)">
      <rect width="744" height="52" rx="10" fill="#0C2A2C" stroke="#2C8F84"/>
      <text x="18" y="22" fill="#5EEAD4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700">SYNC CORE · ALWAYS AVAILABLE</text>
      <text x="18" y="41" fill="#DDFCF7" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17">Types · parsing · simulation · book math · local helpers</text>
    </g>
  </g>

  <g id="boundary" transform="translate(840 112)">
    <rect width="304" height="300" rx="16" fill="#0B1525" stroke="#304461"/>
    <rect x="20" y="20" width="42" height="42" rx="10" fill="#0C2A2C" stroke="#2C8F84"/>
    <path d="M32 39v-6a9 9 0 0118 0v6M29 39h24v17H29z" fill="none" stroke="#5EEAD4" stroke-width="2" stroke-linejoin="round"/>
    <text x="76" y="38" fill="#F8FAFC" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="21" font-weight="700">Safety boundary</text>
    <text x="76" y="57" fill="#94A3B8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">CURRENT RELEASE</text>

    <g transform="translate(20 92)" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16">
      <circle cx="6" cy="0" r="4" fill="#5EEAD4"/><text x="20" y="6" fill="#D7E0EB">No order submission</text>
      <circle cx="6" cy="40" r="4" fill="#5EEAD4"/><text x="20" y="46" fill="#D7E0EB">No cancel path</text>
      <circle cx="6" cy="80" r="4" fill="#5EEAD4"/><text x="20" y="86" fill="#D7E0EB">No private-key signing</text>
      <circle cx="6" cy="120" r="4" fill="#5EEAD4"/><text x="20" y="126" fill="#D7E0EB">No relayer calls</text>
      <circle cx="6" cy="160" r="4" fill="#5EEAD4"/><text x="20" y="166" fill="#D7E0EB">No bridge transfers</text>
    </g>

    <path d="M20 274H284" stroke="#26364F"/>
    <text x="20" y="291" fill="#718096" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11">SAFE DEFAULT ≠ AUTHORIZATION CONTROL</text>
  </g>
</svg>
